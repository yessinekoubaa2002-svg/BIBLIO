<!-- user-form.component.html -->
<div class="container py-4" style="max-width: 640px;">

  <!-- Header -->
  <div class="d-flex align-items-center mb-4">
    <button class="btn btn-outline-secondary btn-sm me-3" (click)="cancel()">
      <i class="bi bi-arrow-left"></i>
    </button>
    <div>
      <h2 class="fw-bold mb-0">
        {{ isEditMode ? '✏️ Modifier' : '➕ Nouvel' }} utilisateur
      </h2>
      <small class="text-muted">{{ isEditMode ? 'Modifier les informations' : 'Créer un nouveau compte' }}</small>
    </div>
  </div>

  <!-- Alerts -->
  <div class="alert alert-danger"  *ngIf="error">{{ error }}</div>
  <div class="alert alert-success" *ngIf="success">{{ success }}</div>

  <!-- Loading spinner -->
  <div class="text-center py-4" *ngIf="loading">
    <div class="spinner-border text-primary"></div>
  </div>

  <!-- Form -->
  <div class="card shadow-sm" *ngIf="!loading">
    <div class="card-body">
      <form (ngSubmit)="submit()" #f="ngForm">
        <div class="row g-3">

          <!-- Prénom -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">Prénom <span class="text-danger">*</span></label>
            <input type="text" class="form-control"
                   [(ngModel)]="form.prenom" name="prenom" required>
          </div>

          <!-- Nom -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">Nom <span class="text-danger">*</span></label>
            <input type="text" class="form-control"
                   [(ngModel)]="form.nom" name="nom" required>
          </div>

          <!-- Email -->
          <div class="col-12">
            <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
            <input type="email" class="form-control"
                   [(ngModel)]="form.email" name="email" required>
          </div>

          <!-- Téléphone -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">Téléphone</label>
            <input type="text" class="form-control"
                   [(ngModel)]="form.telephone" name="telephone">
          </div>

          <!-- Rôle -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">Rôle <span class="text-danger">*</span></label>
            <select class="form-select" [(ngModel)]="form.role" name="role" required>
              <option value="USER">Utilisateur</option>
              <option value="BIBLIOTHECAIRE">Bibliothécaire</option>
              <option value="ADMIN">Administrateur</option>
            </select>
          </div>

          <!-- Bibliothécaire fields -->
          <ng-container *ngIf="isBibliothecaire">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Matricule</label>
              <input type="text" class="form-control"
                     [(ngModel)]="form.matricule" name="matricule">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Salaire</label>
              <input type="number" class="form-control"
                     [(ngModel)]="form.salaire" name="salaire">
            </div>
          </ng-container>

          <!-- Password (only on create) -->
          <div class="col-12" *ngIf="!isEditMode">
            <label class="form-label fw-semibold">
              Mot de passe <span class="text-danger">*</span>
            </label>
            <input type="password" class="form-control"
                   [(ngModel)]="form.motDePasse" name="motDePasse"
                   [required]="!isEditMode" minlength="6">
            <div class="form-text">Minimum 6 caractères.</div>
          </div>

          <!-- Actions -->
          <div class="col-12 d-flex gap-2 mt-2">
            <button type="submit" class="btn btn-primary px-4"
                    [disabled]="loading || f.invalid">
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
              {{ isEditMode ? 'Enregistrer' : 'Créer' }}
            </button>
            <button type="button" class="btn btn-outline-secondary" (click)="cancel()">
              Annuler
            </button>
          </div>

        </div>
      </form>
    </div>
  </div>
</div>
