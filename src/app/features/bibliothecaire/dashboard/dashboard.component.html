<div class="container mt-4">

  <h2>📚 Bibliothécaire Dashboard</h2>

  <table class="table table-bordered mt-3">
    <thead>
      <tr>
        <th>Livre</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let e of emprunts">

        <!-- LIVRE -->
        <td>{{ e.livre?.titre || 'No book' }}</td>

        <!-- STATUS -->
        <td>
          {{ e.valide ? 'VALIDÉ' : 'PENDING' }}
        </td>

        <!-- ACTIONS -->
        <td>
          <button class="btn btn-success btn-sm"
                  (click)="valider(e.id)">
            Valider
          </button>

          <button class="btn btn-warning btn-sm ms-2"
                  (click)="retour(e.id)">
            Retour
          </button>
        </td>

      </tr>
    </tbody>
  </table>

</div>
