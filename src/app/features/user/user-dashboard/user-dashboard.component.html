<div class="container mt-4">

  <h2 class="text-center mb-4">Books Library</h2>

  <div class="row mb-3">
    <div class="col-md-4">
      <input type="text" class="form-control"
        placeholder="Search by title..."
        [(ngModel)]="searchText"
        (keyup.enter)="searchByTitle()">
    </div>
    <div class="col-md-2">
      <button class="btn btn-primary w-100" (click)="searchByTitle()">
        Title
      </button>
    </div>
    <div class="col-md-4">
      <input type="text" class="form-control"
        placeholder="Search by author..."
        [(ngModel)]="authorText"
        (keyup.enter)="searchByAuthor()">
    </div>
    <div class="col-md-2">
      <button class="btn btn-secondary w-100" (click)="searchByAuthor()">
        Author
      </button>
    </div>
  </div>

  <div class="row mb-3">
    <div class="col-md-4">
      <input type="text" class="form-control"
        placeholder="Filter by category..."
        [(ngModel)]="categoryText"
        (keyup.enter)="filterByCategory()">
    </div>
    <div class="col-md-2">
      <button class="btn btn-info w-100" (click)="filterByCategory()">
        Category
      </button>
    </div>
  </div>

  <div class="mb-3 d-flex gap-2">
    <button class="btn btn-outline-dark" (click)="loadBooks()">
      All
    </button>
    <button class="btn btn-outline-success" (click)="filterAvailable()">
      Available
    </button>
    <button class="btn btn-outline-warning" (click)="filterLowStock()">
      Low Stock
    </button>
    <button class="btn btn-outline-secondary" (click)="resetFilters()">
      Reset
    </button>
  </div>

  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let book of books">
      <div class="card shadow-sm h-100">
        <div class="card-body d-flex flex-column">

          <h5 class="fw-bold">{{ book.titre }}</h5>
          <p class="text-muted">{{ book.auteur }}</p>
          <p class="text-muted">{{ book.annee }}</p>

          <p>
            Stock:
            <span [ngClass]="book.quantite > 0 ? 'text-success' : 'text-danger'">
              {{ book.quantite }}
            </span>
          </p>

          <span class="badge mb-2"
            [ngClass]="book.disponible ? 'bg-success' : 'bg-danger'">
            {{ book.disponible ? 'Disponible' : 'Indisponible' }}
          </span>

          <!-- CATEGORY MOVED UNDER DISPO -->
          <p class="mt-1 text-muted">
            Category: {{ book.category?.nom || 'Not defined' }}
          </p>

          <button class="btn btn-primary mt-auto"
            (click)="borrow(book.id)"
            [disabled]="book.quantite === 0">
            Emprunter
          </button>

        </div>
      </div>
    </div>

    <div class="col-12 text-center text-muted" *ngIf="books.length === 0">
      No books found.
    </div>
  </div>

</div>
