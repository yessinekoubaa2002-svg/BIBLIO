<div class="container mt-4">

  <h2 class="mb-4 text-center">📚 Catalogue des Livres</h2>

  <div class="row">

    <div class="col-md-4 mb-4" *ngFor="let book of books">

      <div class="card book-card shadow-sm h-100">

        <img src="https://via.placeholder.com/300x200"
             class="card-img-top"
             alt="book">

        <div class="card-body d-flex flex-column">

          <h5 class="card-title">{{book.titre}}</h5>

          <p class="card-text text-muted">
            ✍️ {{book.auteur}}
          </p>

          <p>
            📦 Stock:
            <span class="badge bg-success" *ngIf="book.stock > 0">
              {{book.stock}}
            </span>
            <span class="badge bg-danger" *ngIf="book.stock == 0">
              Indisponible
            </span>
          </p>

          <button class="btn btn-primary mt-auto"
                  [disabled]="book.stock == 0"
                  (click)="borrow(book.id)">
            📖 Emprunter
          </button>

        </div>

      </div>

    </div>

  </div>

</div>
