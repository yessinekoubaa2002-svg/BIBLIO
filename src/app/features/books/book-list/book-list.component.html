<div class="container mt-4">

  <h2 class="text-center mb-4">📚 Books Library</h2>

  <!-- SEARCH SECTION -->
  <div class="row mb-3">

    <div class="col-md-4">
      <input type="text"
             class="form-control"
             placeholder="Search by title..."
             [(ngModel)]="searchText">
    </div>

    <div class="col-md-2">
      <button class="btn btn-primary w-100" (click)="searchByTitle()">
        🔍 Title
      </button>
    </div>

    <div class="col-md-3">
      <input type="text"
             class="form-control"
             placeholder="Search by author..."
             [(ngModel)]="authorText">
    </div>

    <div class="col-md-3">
      <button class="btn btn-secondary w-100" (click)="searchByAuthor()">
        ✍️ Author
      </button>
    </div>

  </div>
  <input [(ngModel)]="categoryText" placeholder="Category">
<button (click)="filterByCategory()">Category</button>

  <!-- FILTERS -->
  <div class="mb-3">

    <button class="btn btn-outline-dark me-2" (click)="loadBooks()">
      All
    </button>

    <button class="btn btn-outline-success me-2" (click)="filterAvailable()">
      Available
    </button>

    <button class="btn btn-outline-warning me-2" (click)="filterLowStock()">
      Low Stock
    </button>

    <button class="btn btn-outline-info" (click)="resetFilters()">
      Reset
    </button>

  </div>

  <!-- BOOK GRID -->
  <div class="row">

    <div class="col-md-4 mb-4" *ngFor="let book of books">

      <div class="card shadow-sm h-100 book-card">

        <div class="card-body d-flex flex-column">

          <h5 class="fw-bold">{{ book.titre }}</h5>

          <p class="text-muted">✍️ {{ book.auteur }}</p>

          <p>
            📦 Stock:
            <span [class.text-success]="book.quantite > 0"
                  [class.text-danger]="book.quantite == 0">
              {{ book.quantite }}
            </span>
          </p>

          <p *ngIf="book.category">
            🏷️🏷️ {{ book.category.nom }}
          </p>

          <button class="btn btn-primary mt-auto"
                  (click)="borrow(book.id)"
                  [disabled]="book.quantite == 0">

            📖 Emprunter
          </button>

        </div>

      </div>

    </div>

  </div>

</div>
