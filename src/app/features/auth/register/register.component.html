<div class="container">

  <h2>Register</h2>

  <form (ngSubmit)="register()" #registerForm="ngForm">

    <input type="text"
           [(ngModel)]="registerData.nom"
           name="nom"
           placeholder="Nom"
           class="form-control"
           required /><br>

    <input type="text"
           [(ngModel)]="registerData.prenom"
           name="prenom"
           placeholder="Prenom"
           class="form-control"
           required /><br>

    <input type="email"
           [(ngModel)]="registerData.email"
           name="email"
           placeholder="Email"
           class="form-control"
           required /><br>

    <input type="password"
           [(ngModel)]="registerData.motDePasse"
           name="motDePasse"
           placeholder="Mot de passe"
           class="form-control"
           required /><br>

    <!-- ROLE SELECTOR -->
    <div class="role-selector">
      <label>Select Role:</label>
      <div class="role-buttons">

        <button type="button"
                [class.active]="selectedRole === 'USER'"
                (click)="selectedRole = 'USER'">
          👤 User
        </button>

        <button type="button"
                [class.active]="selectedRole === 'BIBLIOTHECAIRE'"
                (click)="selectedRole = 'BIBLIOTHECAIRE'">
          📚 Bibliothecaire
        </button>

        <button type="button"
                [class.active]="selectedRole === 'ADMIN'"
                (click)="selectedRole = 'ADMIN'">
          🛡️ Admin
        </button>

      </div>
    </div><br>

    <button class="btn btn-success w-100"
            type="submit"
            [disabled]="!selectedRole">
      Register as {{ selectedRole || '...' }}
    </button>

  </form>

</div>
