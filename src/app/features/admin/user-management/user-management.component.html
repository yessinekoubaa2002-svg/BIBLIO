<div class="container mt-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>User Management</h2>
    <div class="d-flex gap-2">
      <button class="btn btn-primary" routerLink="/admin/users/create">
        + New User
      </button>
      <button class="btn btn-secondary" routerLink="/admin/bibliothecaires/create">
        + New Bibliothecaire
      </button>
    </div>
  </div>

  <table class="table table-bordered table-hover">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Nom</th>
        <th>Prenom</th>
        <th>Email</th>
        <th>Role</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of users">
        <td>{{ user.id }}</td>
        <td>{{ user.nom }}</td>
        <td>{{ user.prenom }}</td>
        <td>{{ user.email }}</td>
        <td>
          <span class="badge"
            [ngClass]="{
              'bg-danger':  user.role === 'ADMIN',
              'bg-warning text-dark': user.role === 'BIBLIOTHECAIRE',
              'bg-primary': user.role === 'USER'
            }">
            {{ user.role }}
          </span>
        </td>
        <td>
          <button class="btn btn-sm btn-outline-primary me-2"
            [routerLink]="['/admin/users/edit', user.id]">
            Edit
          </button>
          <button class="btn btn-sm btn-outline-danger"
            (click)="deleteUser(user.id)">
            Delete
          </button>
        </td>
      </tr>
      <tr *ngIf="users.length === 0">
        <td colspan="6" class="text-center text-muted">No users found.</td>
      </tr>
    </tbody>
  </table>

</div>
