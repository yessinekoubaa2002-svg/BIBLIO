<div class="container mt-4">

  <h2 class="mb-4">Admin Dashboard</h2>

  <div class="d-flex gap-3 mb-4 flex-wrap">
    <button class="btn btn-primary" routerLink="/admin/users">
      Users
    </button>
    <button class="btn btn-success" routerLink="/admin/bibliothecaires">
      Bibliothecaires
    </button>
    <button class="btn btn-dark" routerLink="/admin/livres">
      Books
    </button>
    <button class="btn btn-warning" routerLink="/admin/categories">
      Categories
    </button>
  </div>

  <div class="row g-3">
    <div class="col-md-3">
      <div class="card text-white bg-primary shadow-sm p-3">
        <h6>Users</h6>
        <h2>{{ stats?.totalUsers }}</h2>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card text-white bg-success shadow-sm p-3">
        <h6>Books</h6>
        <h2>{{ stats?.totalBooks }}</h2>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card text-dark bg-warning shadow-sm p-3">
        <h6>Emprunts</h6>
        <h2>{{ stats?.totalEmprunts }}</h2>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card text-white bg-info shadow-sm p-3">
        <h6>Pending</h6>
        <h2>{{ stats?.pendingEmprunts }}</h2>
      </div>
    </div>
  </div>

</div>
